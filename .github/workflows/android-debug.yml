name: Build Android Debug

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Point ANDROID_HOME at SDK root
        run: echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"

      - name: Install Android SDK platform + build-tools
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "cmdline-tools;latest" \
            "build-tools;35.0.0" \
            "platforms;android-35"

      - name: Clean any leftover wrapper jar
        run: rm -f gradle/wrapper/gradle-wrapper.jar

      - name: Download Gradle 8.9
        run: |
          set -euo pipefail
          curl --fail --location --show-error --silent \
            https://services.gradle.org/distributions/gradle-8.9-bin.zip \
            -o gradle.zip
          unzip -q gradle.zip
          echo "$PWD/gradle-8.9/bin" >> "$GITHUB_PATH"

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.9

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew --no-daemon --stacktrace --info clean assembleDebug

      - name: Name debug APK
        run: |
          set -euo pipefail
          VERSION_NAME=$(grep -m1 'versionName' app/build.gradle | sed -E "s/.*['\"]([^'\"]+)['\"].*/\1/")
          APK_BASENAME="notification-manager-${VERSION_NAME}-debug"
          APK_FILE="${APK_BASENAME}.apk"
          cp app/build/outputs/apk/debug/app-debug.apk "$APK_FILE"
          echo "APK_BASENAME=$APK_BASENAME" >> "$GITHUB_ENV"
          echo "APK_FILE=$APK_FILE" >> "$GITHUB_ENV"

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-and-kotlin-logs
          path: |
            **/build/reports/**
            **/build/tmp/kotlin-compile*/**
            ~/.gradle/daemon/*/daemon-*.out.log
            ~/.gradle/caches/**/kotlin/**
            ./**/build/outputs/logs/**
            ./**/build/*/reports/**

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_BASENAME }}
          path: ${{ env.APK_FILE }}
